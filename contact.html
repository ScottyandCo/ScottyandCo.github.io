    <title>Contact Us</title>
</head>
<body class="w-full bg-[#D9D9D9]">
<header class="sticky md:top-0 bg-[#164E63]">
    <span class="flex w-full gap-4 items-center justify-between">
        <i class="fa-solid fa-terminal text-5xl text-[#ECFEFF] pl-2 pt-2 pb-2"></i>
    <span class="flex md:hidden justify-end">
        <i class="fa-solid fa-burger text-4xl text-[#ECFEFF] pr-2"></i>
    </span>
    </span>
    <nav class="hidden md:flex justify-center">
        <ul class="flex gap-2">
            <li class="min-inline-1/4 bg-[#164E63] rounded-lg py-1 px-2 m-2 text-[#ECFEFF]"><a href=".">Home</a></li>
            <li class="min-inline-1/4 bg-[#164E63] rounded-lg py-1 px-2 m-2 text-[#ECFEFF]"><a href="about.html">About</a></li>
            <li class="min-inline-1/4 bg-[#06B6D4] rounded-lg py-1 px-2 m-2 text-[#ECFEFF]">Contact</li>
            <li class="min-inline-1/4 bg-[#164E63] rounded-lg py-1 px-2 m-2 text-[#ECFEFF]"><a href="resume.html">Resume</a></li>
            <li class="min-inline-1/4 bg-[#164E63] rounded-lg py-1 px-2 m-2 text-[#ECFEFF]"><a href="projects.html">Projects</a></li>
        </ul>
    </nav>
</header>
<main class="flex text-[#ECFEFF] py-10">
        <article class="p-4 px-6 bg-[#303030] mx-auto rounded-2xl">
            <form class="flex flex-col gap-1" id="myForm">
                <h1 class="text-xl font-bold mx-auto mb-4">Contact Us</h1>
                        <p><label for="name">Name</label></p>
                        <input class="p-2 rounded-md text-[#ECFEFF] bg-[#303030] border border-solid border-[#ECFEFF]]" type="text" id="name" name="name" placeholder="Enter your name">
                        <p class="mb-4" id="nameContainer"></p>
                        <p><label for="email">Email</label></p>
                        <input class="p-2 rounded-md text-[#ECFEFF] bg-[#303030] border border-solid border-[#ECFEFF]]" type="text" id="email" name="email" placeholder="Enter your email">
                        <p class="mb-4" id="emailContainer"></p>
                        <p><label for="message">Message</label></p>
                        <textarea class="p-2 rounded-md text-[#ECFEFF] bg-[#303030] border border-solid border-[#ECFEFF]]" rows="3" id="message" name="message" placeholder="Enter your message"></textarea>
                        <p class="mb-4" id="messageContainer"></p>
                        <p>
                            <button class="flex my-6 bg-[#06B6D4] rounded-md py-1 px-2 text-[#000000] mx-auto w-full justify-center" type="submit">Submit</button>
                        </p>
                    </form>
                    <p id="returnContainer"></p>
        </article>       
</main>
<footer class="sticky md:bottom-0 p-4 flex flex-col md:flex-row items-center justify-between gap-4 md:w-full mx-auto bg-[#164E63] text-[#ECFEFF]">
    <section class="flex items-center gap-4">
        <i class="fa-solid fa-terminal pl-1 pr-4 text-3xl"></i>
        <p class="text-sm">© Copyright 2026 Jason Scott.</p>
    </section>
    <section>
        <ul class="flex flex-row gap-4 text-sm">

            <li>|</li>

        </ul>
    </section>
</footer>
